<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI チャットボット デモ | 問い合わせ対応の24時間自動化</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Noto Sans JP', 'Inter', sans-serif;
  background: #111;
  color: #fff;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* Back link */
.back-link {
  position: fixed;
  top: 16px;
  left: 16px;
  z-index: 100;
  color: #888;
  text-decoration: none;
  font-size: 14px;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: color 0.2s;
}
.back-link:hover {
  color: #fff;
}
.back-link svg {
  width: 16px;
  height: 16px;
  fill: currentColor;
}

/* Page header */
.page-header {
  text-align: center;
  padding: 60px 20px 30px;
  max-width: 600px;
}
.page-header h1 {
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 8px;
  letter-spacing: 0.02em;
}
.page-header p {
  font-size: 14px;
  color: #888;
  line-height: 1.7;
}

/* Chat container */
.chat-container {
  width: 100%;
  max-width: 440px;
  margin: 0 auto 60px;
  padding: 0 16px;
}

.chat-widget {
  background: #1a1a1a;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 8px 40px rgba(0,0,0,0.4);
  display: flex;
  flex-direction: column;
  height: 580px;
  max-height: 75vh;
}

/* Chat header */
.chat-header {
  background: #111;
  padding: 16px 20px;
  border-bottom: 1px solid #2a2a2a;
  flex-shrink: 0;
}
.chat-header-top {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 10px;
}
.chat-avatar {
  width: 36px;
  height: 36px;
  background: #333;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}
.chat-header-info h2 {
  font-size: 15px;
  font-weight: 600;
}
.chat-header-info span {
  font-size: 12px;
  color: #666;
}
.status-banner {
  background: #222;
  border: 1px solid #333;
  border-radius: 8px;
  padding: 6px 12px;
  font-size: 11px;
  color: #aaa;
  display: flex;
  align-items: center;
  gap: 8px;
}
.status-dot {
  width: 6px;
  height: 6px;
  background: #4ade80;
  border-radius: 50%;
  animation: pulse-dot 2s infinite;
}
@keyframes pulse-dot {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* Messages area */
.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px 16px 8px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  scrollbar-width: thin;
  scrollbar-color: #333 transparent;
}
.chat-messages::-webkit-scrollbar {
  width: 4px;
}
.chat-messages::-webkit-scrollbar-thumb {
  background: #333;
  border-radius: 4px;
}

.message {
  display: flex;
  gap: 8px;
  max-width: 85%;
  animation: msg-in 0.3s ease;
}
@keyframes msg-in {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.message.bot {
  align-self: flex-start;
}
.message.user {
  align-self: flex-end;
  flex-direction: row-reverse;
}

.msg-avatar {
  width: 28px;
  height: 28px;
  background: #333;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  flex-shrink: 0;
  margin-top: 2px;
}
.message.user .msg-avatar {
  background: #444;
}

.msg-bubble {
  padding: 10px 14px;
  border-radius: 14px;
  font-size: 14px;
  line-height: 1.7;
}
.message.bot .msg-bubble {
  background: #262626;
  color: #e0e0e0;
  border-bottom-left-radius: 4px;
}
.message.user .msg-bubble {
  background: #fff;
  color: #111;
  border-bottom-right-radius: 4px;
}

/* Typing indicator */
.typing-indicator {
  display: flex;
  gap: 4px;
  padding: 12px 16px;
}
.typing-indicator span {
  width: 7px;
  height: 7px;
  background: #555;
  border-radius: 50%;
  animation: typing-bounce 1.2s infinite;
}
.typing-indicator span:nth-child(2) { animation-delay: 0.15s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.3s; }
@keyframes typing-bounce {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-6px); opacity: 1; }
}

/* Quick replies */
.quick-replies {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  padding: 8px 16px 12px;
  animation: msg-in 0.3s ease;
}
.quick-btn {
  background: transparent;
  border: 1px solid #444;
  color: #ccc;
  padding: 7px 14px;
  border-radius: 20px;
  font-size: 13px;
  font-family: 'Noto Sans JP', sans-serif;
  cursor: pointer;
  transition: all 0.2s;
}
.quick-btn:hover {
  background: #333;
  border-color: #666;
  color: #fff;
}

/* Input area */
.chat-input-area {
  padding: 12px 16px;
  border-top: 1px solid #2a2a2a;
  display: flex;
  gap: 8px;
  flex-shrink: 0;
  background: #1a1a1a;
}
.chat-input {
  flex: 1;
  background: #262626;
  border: 1px solid #333;
  border-radius: 24px;
  padding: 10px 16px;
  color: #fff;
  font-size: 14px;
  font-family: 'Noto Sans JP', 'Inter', sans-serif;
  outline: none;
  transition: border-color 0.2s;
}
.chat-input::placeholder {
  color: #555;
}
.chat-input:focus {
  border-color: #555;
}
.send-btn {
  width: 40px;
  height: 40px;
  background: #fff;
  border: none;
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: opacity 0.2s;
}
.send-btn:hover {
  opacity: 0.8;
}
.send-btn svg {
  width: 18px;
  height: 18px;
  fill: #111;
}

/* Footer note */
.demo-note {
  text-align: center;
  padding: 0 20px 40px;
  font-size: 12px;
  color: #555;
}

@media (max-width: 480px) {
  .page-header {
    padding: 50px 16px 20px;
  }
  .page-header h1 {
    font-size: 18px;
  }
  .chat-widget {
    height: 520px;
    border-radius: 12px;
  }
  .back-link {
    top: 12px;
    left: 12px;
  }
}
</style>
</head>
<body>

<a href="../index.html" class="back-link">
  <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
  戻る
</a>

<div class="page-header">
  <h1>問い合わせ対応の24時間自動化</h1>
  <p>Dify / n8n を活用した AI チャットボットのデモです。<br>下のチャットで実際の応答を体験できます。</p>
</div>

<div class="chat-container">
  <div class="chat-widget">
    <div class="chat-header">
      <div class="chat-header-top">
        <div class="chat-avatar">AI</div>
        <div class="chat-header-info">
          <h2>AI アシスタント</h2>
          <span>自動応答システム</span>
        </div>
      </div>
      <div class="status-banner">
        <span class="status-dot"></span>
        24時間365日 自動対応中
      </div>
    </div>

    <div class="chat-messages" id="chatMessages"></div>

    <div class="chat-input-area">
      <input type="text" class="chat-input" id="chatInput" placeholder="メッセージを入力..." autocomplete="off">
      <button class="send-btn" id="sendBtn" aria-label="送信">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
</div>

<p class="demo-note">これはデモ用のシミュレーションです。実際のAIバックエンドには接続されていません。</p>

<script>
const messagesEl = document.getElementById('chatMessages');
const inputEl = document.getElementById('chatInput');
const sendBtn = document.getElementById('sendBtn');

const responses = {
  '料金について': {
    text: 'ありがとうございます。料金プランは以下の通りです。\n\n・ライトプラン：月額 ¥29,800\n・スタンダードプラン：月額 ¥59,800\n・プレミアムプラン：月額 ¥98,000\n\n詳しいお見積もりも可能です。ご希望でしたらお気軽にどうぞ。'
  },
  'サービス内容': {
    text: '当社では以下のサービスを提供しております。\n\n・AI チャットボット構築（Dify / n8n）\n・業務自動化コンサルティング\n・Webサイト制作・LP制作\n・SNS運用代行\n\nどのサービスについて詳しくお聞きになりますか？'
  },
  '営業時間': {
    text: 'お問い合わせの受付時間についてご案内いたします。\n\n・AIチャットボット：24時間365日対応\n・メール対応：平日 9:00〜18:00\n・電話対応：平日 10:00〜17:00\n\nお急ぎの場合は 070-4006-7038 までお電話ください。'
  },
  '予約したい': {
    text: 'ご予約ありがとうございます。無料相談のご予約を承ります。\n\nご希望の日時を以下の形式でお知らせください。\n例：「3月25日 14:00」\n\nまたはお電話（070-4006-7038）でもご予約いただけます。'
  },
  '導入事例': {
    text: '導入事例をいくつかご紹介いたします。\n\n【飲食店 A様】\n→ 予約対応を自動化し、電話対応を70%削減\n\n【ECサイト B様】\n→ 問い合わせ対応を24時間化し、売上15%向上\n\n【クリニック C様】\n→ 予約・問診の自動化で受付業務を半減\n\n詳しい資料もご用意しております。'
  },
  '納期': {
    text: '納期の目安は以下の通りです。\n\n・チャットボット構築：約2〜4週間\n・業務自動化：約3〜6週間\n・Webサイト制作：約4〜8週間\n\nプロジェクトの規模により変動いたします。まずはヒアリングさせていただければ、正確なスケジュールをお出しできます。'
  }
};

const keywordMap = [
  { keywords: ['料金', '値段', '価格', 'いくら', '費用', 'コスト', 'プラン'], key: '料金について' },
  { keywords: ['サービス', '内容', '何ができる', 'できること', '提供'], key: 'サービス内容' },
  { keywords: ['営業', '時間', '何時', '対応時間', '受付'], key: '営業時間' },
  { keywords: ['予約', '相談', '申し込み', '申込', 'アポ', '面談'], key: '予約したい' },
  { keywords: ['事例', '実績', '導入', 'ケース'], key: '導入事例' },
  { keywords: ['納期', 'いつ', 'どれくらい', '期間', 'スケジュール'], key: '納期' },
];

const defaultResponse = '申し訳ございません。そちらのご質問にはお答えしかねます。\n\n詳しくはお電話（070-4006-7038）でお問い合わせください。担当者が丁寧にご対応いたします。';

function findResponse(input) {
  // Exact match
  if (responses[input]) return responses[input].text;

  // Keyword match
  const normalized = input.toLowerCase();
  for (const mapping of keywordMap) {
    for (const kw of mapping.keywords) {
      if (normalized.includes(kw)) {
        return responses[mapping.key].text;
      }
    }
  }

  return defaultResponse;
}

function addMessage(text, sender) {
  const wrapper = document.createElement('div');
  wrapper.className = `message ${sender}`;

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = sender === 'bot' ? 'AI' : '';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.innerHTML = text.replace(/\n/g, '<br>');

  wrapper.appendChild(avatar);
  wrapper.appendChild(bubble);
  messagesEl.appendChild(wrapper);
  scrollToBottom();
}

function addTypingIndicator() {
  const wrapper = document.createElement('div');
  wrapper.className = 'message bot';
  wrapper.id = 'typingMsg';

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = 'AI';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';

  wrapper.appendChild(avatar);
  wrapper.appendChild(bubble);
  messagesEl.appendChild(wrapper);
  scrollToBottom();
}

function removeTypingIndicator() {
  const el = document.getElementById('typingMsg');
  if (el) el.remove();
}

function addQuickReplies(options) {
  const container = document.createElement('div');
  container.className = 'quick-replies';
  container.id = 'quickReplies';

  options.forEach(label => {
    const btn = document.createElement('button');
    btn.className = 'quick-btn';
    btn.textContent = label;
    btn.addEventListener('click', () => {
      handleUserInput(label);
    });
    container.appendChild(btn);
  });

  messagesEl.appendChild(container);
  scrollToBottom();
}

function removeQuickReplies() {
  const el = document.getElementById('quickReplies');
  if (el) el.remove();
}

function scrollToBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

let isBotTyping = false;

function handleUserInput(text) {
  if (!text.trim() || isBotTyping) return;

  removeQuickReplies();
  addMessage(text, 'user');
  inputEl.value = '';
  isBotTyping = true;

  const responseText = findResponse(text.trim());
  const delay = 800 + Math.random() * 800;

  addTypingIndicator();

  setTimeout(() => {
    removeTypingIndicator();
    addMessage(responseText, 'bot');
    isBotTyping = false;

    // Show follow-up quick replies after a short pause
    setTimeout(() => {
      addQuickReplies(['料金について', 'サービス内容', '導入事例', '納期']);
    }, 400);
  }, delay);
}

// Send on button click
sendBtn.addEventListener('click', () => {
  handleUserInput(inputEl.value);
});

// Send on Enter key
inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.isComposing) {
    handleUserInput(inputEl.value);
  }
});

// Initial greeting
setTimeout(() => {
  addMessage('こんにちは！AIアシスタントです。ご質問をどうぞ。', 'bot');

  setTimeout(() => {
    addQuickReplies(['料金について', 'サービス内容', '営業時間', '予約したい']);
  }, 500);
}, 600);
</script>

</body>
</html>
